spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}

neobankx:
  security:
    jwt:
      issuer: ${JWT_ISSUER:neobankx-auth}
      secret: ${JWT_SECRET}
  routes:
    auth-service-uri: ${AUTH_SERVICE_URI:http://localhost:8081}
  rate-limit:
    replenish-rate: ${GATEWAY_RATE_REPLENISH:20}
    burst-capacity: ${GATEWAY_RATE_BURST:40}
    requested-tokens: 1

resilience4j:
  circuitbreaker:
    instances:
      auth-service:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 20s
  timelimiter:
    instances:
      auth-service:
        timeout-duration: 5s

logging:
  pattern:
    level: "%5p correlationId=%X{correlationId:-}"

